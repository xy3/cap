name: release

# Cut a release by pushing a version tag:
#
#   git tag 1.3.0 && git push --tags
#
# GitHub then builds the Linux binary and the Windows bundles (CPU + CUDA) and
# publishes a release with the assets the in-app self-updater expects. Nothing is
# built on your machine. Both "1.3.0" and "v1.3.0" style tags work.

on:
  push:
    tags:
      - "[0-9]*"
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Free up runner disk space
        run: |
          # The CUDA bundle is large; reclaim space the default image wastes.
          # (Don't touch the tool cache — that's where setup-go put Go.)
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell || true
          df -h /

      - name: Build Linux + Windows artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Linux self-update asset (must keep this exact name).
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X capper/cmd.Version=$VERSION" \
            -o dist/capper-linux-amd64 .
          # GPU (CUDA) bundle first; rename so the CPU build's zip doesn't
          # clobber it. capper.exe is identical between the two. Both ship the
          # small base model; users download bigger models from the app's UI.
          GPU=1 ./scripts/build-windows.sh
          mv dist/capper-win64.zip dist/capper-win64-cuda.zip
          # CPU bundle (base model) → dist/capper-win64.zip + dist/capper.exe.
          ./scripts/build-windows.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: capper ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/capper.exe
            dist/capper-linux-amd64
            dist/capper-win64.zip
            dist/capper-win64-cuda.zip
